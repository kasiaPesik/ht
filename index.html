<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HabitFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:       #07070f;
  --bg2:      #0c0c18;
  --bg3:      #111120;
  --card:     #12121e;
  --card2:    #18182a;
  --border:   #1e1e32;
  --border2:  #28283e;
  --border3:  #35354f;
  --pu:       #6c3bff;
  --pu2:      #8b5cf6;
  --pu3:      #a78bfa;
  --pdim:     rgba(108,59,255,0.13);
  --pglow:    rgba(108,59,255,0.22);
  --cyan:     #22d3ee;
  --green:    #10b981;
  --rose:     #f43f5e;
  --amber:    #f59e0b;
  --text:     #f1f0ff;
  --text2:    #7070a0;
  --text3:    #36365a;
  --r:        13px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(108,59,255,0.016) 1px,transparent 1px),linear-gradient(90deg,rgba(108,59,255,0.016) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0;}
.glow-tr{position:fixed;top:-20%;right:-10%;width:600px;height:600px;background:radial-gradient(circle,rgba(108,59,255,0.07) 0%,transparent 65%);pointer-events:none;z-index:0;}
.glow-bl{position:fixed;bottom:-25%;left:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(34,211,238,0.04) 0%,transparent 65%);pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:24px 20px 80px;}

/* ─── HEADER ───────────────────────── */
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}

.logo{display:flex;align-items:center;gap:10px;}
.logo-wordmark{font-size:1.35rem;font-weight:800;letter-spacing:-0.5px;color:var(--text);}
.logo-wordmark span{color:var(--pu3);}
.logo-dot{width:7px;height:7px;background:var(--pu);border-radius:50%;box-shadow:0 0 10px var(--pglow);}

.month-nav{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border2);border-radius:50px;padding:4px 7px;}
.month-nav button{background:none;border:none;color:var(--text2);cursor:pointer;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.85rem;transition:all .2s;}
.month-nav button:hover{background:var(--border2);color:var(--pu3);}
#monthLabel{font-weight:700;font-size:0.74rem;letter-spacing:1.8px;text-transform:uppercase;color:var(--text);min-width:126px;text-align:center;}

.btn-add{background:var(--pu);color:#fff;border:none;border-radius:50px;padding:9px 20px;font-family:'Poppins',sans-serif;font-size:0.78rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;box-shadow:0 4px 20px var(--pglow);letter-spacing:.3px;}
.btn-add:hover{transform:translateY(-2px);background:#7c4dff;box-shadow:0 8px 28px rgba(108,59,255,0.38);}

/* ─── ROUTINE TABS ──────────────────── */
.rtabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.rtab{padding:5px 15px;border-radius:50px;border:1.5px solid var(--border2);background:transparent;color:var(--text2);font-family:'Poppins',sans-serif;font-size:0.72rem;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.4px;}
.rtab:hover{border-color:var(--border3);color:var(--text);}
.rtab.active{background:var(--pdim);border-color:var(--pu);color:var(--pu3);}

/* ─── KPI ROW ───────────────────────── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px;}
@media(max-width:680px){.kpi-row{grid-template-columns:repeat(2,1fr);}}
.kpi-card{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:14px;position:relative;overflow:hidden;transition:border-color .2s,transform .15s;}
.kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--pu),var(--pu3));opacity:.5;}
.kpi-card:hover{border-color:var(--border3);transform:translateY(-1px);}
.kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.kpi-lbl{font-size:0.58rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);}
.kpi-icon{font-size:0.9rem;opacity:.6;}
.kpi-val{font-size:1.5rem;font-weight:900;line-height:1;letter-spacing:-0.5px;margin-bottom:2px;color:var(--text);}
.kpi-val.vp{background:linear-gradient(135deg,var(--pu3),var(--pu));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.kpi-val.vc{color:var(--cyan);}
.kpi-val.vg{color:var(--green);}
.kpi-val.va{color:var(--amber);}
.kpi-sub{font-size:0.63rem;color:var(--text2);font-weight:400;}
.prog-wrap{height:2px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--pu),var(--pu3));transition:width .5s;}

/* ─── MID ROW: chart + calendar ─────── */
.mid-row{display:grid;grid-template-columns:1fr 380px;gap:12px;margin-bottom:14px;align-items:stretch;}
@media(max-width:960px){.mid-row{grid-template-columns:1fr 320px;}}
@media(max-width:760px){.mid-row{grid-template-columns:1fr;}}

.chart-card{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:16px;position:relative;overflow:hidden;display:flex;flex-direction:column;}
.chart-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--pu),var(--pu3));opacity:.35;}
.chart-lbl{font-size:0.58rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:10px;flex-shrink:0;}
.line-wrap{position:relative;flex:1;min-height:120px;}

/* ─── CALENDAR ─────────────────────── */
.cal-card{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:22px 16px 18px;position:relative;}
.cal-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--pu),var(--pu3));opacity:.35;border-radius:var(--r) var(--r) 0 0;z-index:0;}
.cal-top,.cal-wdays,.cal-grid{position:relative;z-index:1;}

.cal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-mname{font-size:0.72rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--text);}
.cal-pct{font-size:0.72rem;font-weight:700;color:var(--pu3);}

.cal-wdays{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
  margin-bottom:4px;
  padding:0 2px;
}
.cal-wd{
  font-size:0.55rem;font-weight:700;
  color:var(--text3);text-align:center;
  letter-spacing:.2px;
  padding:2px 0;
}

.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
  padding:0 2px;
}

/* Each cell is just a grid slot, the SPAN is the visible circle */
.cal-d{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
.cal-d span{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  aspect-ratio:1/1;
  border-radius:50%;
  font-size:0.65rem;
  font-weight:600;
  color:var(--text3);
  transition:all .15s;
  min-width:0;
}
.cal-d.empty{pointer-events:none;}
.cal-d.empty span{visibility:hidden;}

.cal-d.av span{border:1.5px solid var(--border2);color:var(--text2);}
.cal-d.done span{background:var(--pu);border:1.5px solid var(--pu);color:#fff;box-shadow:0 0 8px rgba(108,59,255,0.4);}
.cal-d.partial span{background:rgba(108,59,255,0.18);border:1.5px solid rgba(108,59,255,0.4);color:var(--pu3);}
.cal-d.fut span{border:1.5px solid var(--border);color:var(--text3);opacity:.3;}
.cal-d.today-r span{border:2px solid var(--cyan)!important;color:var(--cyan)!important;box-shadow:0 0 9px rgba(34,211,238,0.25)!important;}
.cal-d.today-r.done span{background:var(--pu);color:#fff!important;}

/* ─── SECTION HEAD ─────────────────── */
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.sec-lbl{font-size:0.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);white-space:nowrap;}
.sec-line{flex:1;height:1px;background:var(--border);}
.sec-badge{font-size:0.57rem;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.sec-badge.d{background:var(--pdim);color:var(--pu3);border:1px solid rgba(108,59,255,0.18);}

/* ─── HABIT ROW ─────────────────────── */
.habits-section{margin-bottom:12px;}
.habit-row{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);margin-bottom:7px;overflow:hidden;transition:border-color .2s;position:relative;}
.habit-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--hc,var(--pu));opacity:.8;}
.habit-row:hover{border-color:var(--border3);}
.habit-row.dragging{opacity:.35;}
.habit-row.drag-over{border-color:var(--pu);box-shadow:0 0 0 1px var(--pu);}

.hab-hdr{display:flex;align-items:center;padding:10px 12px 10px 15px;gap:8px;flex-wrap:wrap;}
.drag-handle{color:var(--text3);cursor:grab;font-size:0.82rem;flex-shrink:0;user-select:none;padding:2px 3px;border-radius:4px;transition:color .2s;line-height:1;}
.drag-handle:hover{color:var(--text2);}
.drag-handle:active{cursor:grabbing;}
.hab-name{font-size:0.85rem;font-weight:600;flex:1;min-width:90px;}
.streak-pill{display:inline-flex;align-items:center;gap:3px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.2);border-radius:20px;padding:1px 7px;font-size:0.57rem;font-weight:700;color:var(--amber);flex-shrink:0;}
.rtag{font-size:0.55rem;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:2px 6px;flex-shrink:0;}
.hab-prog{font-size:0.64rem;font-weight:700;color:var(--text3);flex-shrink:0;font-variant-numeric:tabular-nums;}
.hab-prog b{color:var(--pu3);}
.hab-btns{display:flex;gap:4px;flex-shrink:0;}
.btn-ic{background:none;border:1px solid var(--border2);color:var(--text3);width:25px;height:25px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.68rem;transition:all .2s;}
.btn-ic:hover{border-color:var(--rose);color:var(--rose);}
.btn-ic.edit:hover{border-color:var(--pu2);color:var(--pu2);}

.days-outer{overflow-x:auto;padding:0 15px 10px 15px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.days-grid{display:flex;gap:4px;min-width:max-content;}
.day-col{display:flex;flex-direction:column;align-items:center;gap:3px;}
.d-num{font-size:0.5rem;font-weight:600;color:var(--text3);height:11px;display:flex;align-items:center;font-variant-numeric:tabular-nums;}
.d-cb{width:23px;height:23px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:0.58rem;font-weight:900;color:transparent;}
.d-cb:hover:not(.future){border-color:var(--pu);box-shadow:0 0 6px var(--pglow);transform:scale(1.1);}
.d-cb.checked{background:var(--cc,var(--pu));border-color:var(--cc,var(--pu));color:#fff;box-shadow:0 0 8px rgba(108,59,255,0.32);}
.d-cb.today-r{border-color:var(--cyan)!important;box-shadow:0 0 7px rgba(34,211,238,0.2);}
.d-cb.today-r.checked{border-color:var(--cyan)!important;}
.d-cb.future{opacity:.15;cursor:default;pointer-events:none;}

/* ─── MONTHLY ────────────────────────── */
.monthly-divider{display:flex;align-items:center;gap:12px;margin:22px 0 14px;padding:13px 16px;background:linear-gradient(135deg,rgba(108,59,255,0.06),rgba(168,85,247,0.03));border:1px solid rgba(108,59,255,0.12);border-radius:var(--r);position:relative;overflow:hidden;}
.monthly-divider::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--pu),var(--pu3));}
.mdiv-title{font-size:0.86rem;font-weight:700;color:var(--pu3);margin-bottom:1px;}
.mdiv-sub{font-size:0.66rem;color:var(--text2);}

.monthly-layout{display:grid;grid-template-columns:1fr 190px;gap:12px;align-items:start;}
@media(max-width:700px){.monthly-layout{grid-template-columns:1fr;}}

.m-item{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);margin-bottom:7px;overflow:hidden;transition:border-color .2s;position:relative;}
.m-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--hc,var(--pu2));opacity:.8;}
.m-item:hover{border-color:var(--border3);}
.m-inner{display:flex;align-items:center;padding:11px 12px 11px 15px;gap:8px;}
.m-name{font-size:0.84rem;font-weight:600;flex:1;min-width:70px;}
.m-status{font-size:0.63rem;font-weight:600;flex-shrink:0;}
.m-status.done{color:var(--pu3);background:var(--pdim);padding:2px 8px;border-radius:20px;}
.m-status.open{color:var(--text3);}
.m-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0;}
.m-check:hover{border-color:var(--pu);box-shadow:0 0 8px var(--pglow);}
.m-check.done{background:var(--pu);border-color:var(--pu);box-shadow:0 0 10px var(--pglow);}
.m-check.done::after{content:'✓';font-weight:900;color:#fff;font-size:0.75rem;}
.m-btns{display:flex;gap:4px;flex-shrink:0;}

/* DONUT */
.m-donut-card{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:16px;text-align:center;position:sticky;top:14px;}
.m-donut-lbl{font-size:0.57rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;text-align:left;}
.m-donut-wrap{position:relative;width:110px;height:110px;margin:0 auto 8px;}
.m-donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.m-donut-pct{font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,var(--pu3),var(--pu));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.m-donut-sub{font-size:0.5rem;font-weight:600;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-top:1px;}
.m-count{font-size:0.67rem;font-weight:600;color:var(--text2);}

/* EMPTY */
.empty{text-align:center;padding:28px 20px;color:var(--text3);}
.empty p{font-size:0.73rem;line-height:1.6;}

/* ─── MODAL ──────────────────────────── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.87);backdrop-filter:blur(12px);z-index:200;align-items:center;justify-content:center;padding:20px;}
.overlay.open{display:flex;}
.modal{background:var(--card2);border:1px solid var(--border3);border-radius:18px;padding:26px;width:100%;max-width:415px;box-shadow:0 24px 60px rgba(0,0,0,0.6);animation:mIn .23s cubic-bezier(.34,1.56,.64,1);}
@keyframes mIn{from{opacity:0;transform:scale(.9) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal h2{font-size:1.1rem;font-weight:800;margin-bottom:18px;background:linear-gradient(90deg,var(--pu3),var(--pu));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.fg{margin-bottom:13px;}
.fg label{display:block;font-size:0.58rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
input[type="text"],select{width:100%;background:var(--bg3);border:1.5px solid var(--border2);border-radius:8px;color:var(--text);padding:9px 12px;font-family:'Poppins',sans-serif;font-size:0.86rem;outline:none;transition:border-color .2s;}
input[type="text"]:focus,select:focus{border-color:var(--pu);box-shadow:0 0 10px rgba(108,59,255,0.1);}
select option{background:var(--card2);}
.fr{display:flex;gap:10px;}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;max-height:124px;overflow-y:auto;padding:2px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
.e-btn{background:var(--bg3);border:1.5px solid var(--border);border-radius:7px;padding:4px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;aspect-ratio:1;transition:all .15s;}
.e-btn:hover{border-color:var(--pu);transform:scale(1.1);}
.e-btn.sel{border-color:var(--pu);background:var(--pdim);}
.custom-row{display:flex;gap:7px;margin-top:6px;align-items:center;}
.custom-row input{flex:1;}
.emo-prev{font-size:1.2rem;width:32px;text-align:center;flex-shrink:0;}
.colors{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.c-btn{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .15s;}
.c-btn:hover,.c-btn.sel{border-color:#fff;transform:scale(1.15);}
.modal-btns{display:flex;gap:8px;margin-top:18px;}
.btn-cancel{flex:1;background:var(--bg3);border:1.5px solid var(--border2);color:var(--text2);border-radius:8px;padding:10px;font-family:'Poppins',sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-cancel:hover{color:var(--text);border-color:var(--border3);}
.btn-save{flex:2;background:var(--pu);border:none;color:#fff;border-radius:8px;padding:10px;font-family:'Poppins',sans-serif;font-size:0.78rem;font-weight:800;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px var(--pglow);}
.btn-save:hover{background:#7c4dff;box-shadow:0 6px 22px rgba(108,59,255,0.4);transform:translateY(-1px);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--card2);border:1px solid var(--border3);border-radius:50px;padding:8px 20px;font-size:0.75rem;font-weight:600;color:var(--text);opacity:0;transition:all .3s;z-index:300;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
</style>
</head>
<body>
<div class="glow-tr"></div>
<div class="glow-bl"></div>
<div class="app">

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <div class="logo-wordmark">Habit<span>Flow</span></div>
  </div>
  <div class="month-nav">
    <button id="btnPrev">&#8592;</button>
    <div id="monthLabel"></div>
    <button id="btnNext">&#8594;</button>
  </div>
  <button class="btn-add" id="btnOpenModal">+ Nowy nawyk</button>
</header>

<!-- ROUTINE TABS -->
<div class="rtabs">
  <button class="rtab active" data-r="all">🌅 Wszystkie</button>
  <button class="rtab" data-r="morning">🌄 Poranna</button>
  <button class="rtab" data-r="evening">🌙 Wieczorna</button>
  <button class="rtab" data-r="daily">☀️ Dzienna</button>
</div>

<!-- KPI -->
<div class="kpi-row" id="kpiGrid"></div>

<!-- CHART + CALENDAR -->
<div class="mid-row">
  <div class="chart-card">
    <div class="chart-lbl">Ukończenie dzienne</div>
    <div class="line-wrap"><canvas id="lineChart"></canvas></div>
  </div>
  <div class="cal-card" id="calCard"></div>
</div>

<!-- DAILY -->
<div class="habits-section" id="secDaily">
  <div class="sec-head">
    <span class="sec-lbl">Nawyki dzienne</span>
    <div class="sec-line"></div>
    <span class="sec-badge d" id="dailyBadge"></span>
  </div>
  <div id="dailyList"></div>
</div>

<!-- MONTHLY -->
<div id="secMonthly" style="display:none">
  <div class="monthly-divider">
    <div>
      <div class="mdiv-title">Nawyki miesięczne</div>
      <div class="mdiv-sub">Cele i zadania na cały miesiąc</div>
    </div>
  </div>
  <div class="monthly-layout">
    <div id="monthlyList"></div>
    <div class="m-donut-card">

          <div class="m-donut-sub">ukończone</div>
        </div>
      </div>
      <div class="m-count" id="mCount"></div>
    </div>
  </div>
</div>

<div class="overlay" id="modalOverlay">
  <div class="modal">

    </div>

<div class="toast" id="toastEl"></div>

<script>
// ─── CONSTANTS ──────────────────────────────
const EMOJIS=['💧','🏃','📚','🧘','💪','🥗','😴','✍️','🎯','🚴','🎨','🎵','🧹','💊','🌿','🧠','❤️','☀️','🌙','🍎','🥤','🛁','🚶','📝','🎸','🤸','🐾','🌸','🍵','⚡','🦷','💰','📖','🎤','🏋️','🧴','🌟','🫶','🧡','🏅','🔋','🌊','🥊','🌱','🎮','🎧','🛏️','🫖'];
const COLORS=['#6c3bff','#a855f7','#22d3ee','#10b981','#f59e0b','#f43f5e','#fb923c','#818cf8'];
const MONTHS=['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
// Mon-based weekday labels
const WDAYS=['Pn','Wt','Śr','Cz','Pt','So','Nd'];

// ─── STATE ──────────────────────────────────
let habits = JSON.parse(localStorage.getItem('hf6_habits')||'[]');
let checks = JSON.parse(localStorage.getItem('hf6_checks')||'{}');
const NOW = new Date();
let vY = NOW.getFullYear(), vM = NOW.getMonth();
const TY = NOW.getFullYear(), TM = NOW.getMonth(), TD = NOW.getDate();
let activeR = 'all';
let lineInst = null, donutInst = null;
let editId = null, selEmoji = '✨', selColor = COLORS[0], selEBtn = null;
let dragSrcId = null;

// ─── HELPERS ────────────────────────────────
const daysIn = (y,m) => new Date(y, m+1, 0).getDate();
// zero-padded date key
const dk = (y,m,d) => `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const mk = (y,m)   => `${y}-${String(m+1).padStart(2,'0')}`;
const isViewNow = () => vY===TY && vM===TM;
const isToday   = d  => isViewNow() && d===TD;

function isFuture(d) {
  const t = new Date(vY, vM, d); t.setHours(0,0,0,0);
  const n = new Date();           n.setHours(0,0,0,0);
  return t > n;
}

// Mon=0 … Sun=6 index (JS getDay: 0=Sun,1=Mon…6=Sat)
function monIndex(jsDay) { return jsDay === 0 ? 6 : jsDay - 1; }

const getChk = id => checks[id] || {};
function setChk(id, key, val) {
  if (!checks[id]) checks[id] = {};
  if (val) checks[id][key] = true; else delete checks[id][key];
  save();
}
function save() {
  localStorage.setItem('hf6_habits', JSON.stringify(habits));
  localStorage.setItem('hf6_checks', JSON.stringify(checks));
}
function toast(msg) {
  const t = document.getElementById('toastEl');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ─── STREAK ─────────────────────────────────
function calcStreak(id) {
  const hd = getChk(id);
  let cur = 0;
  const d = new Date(TY, TM, TD);
  while (true) {
    const k = dk(d.getFullYear(), d.getMonth(), d.getDate());
    if (hd[k]) { cur++; d.setDate(d.getDate()-1); } else break;
  }
  const dates = Object.keys(hd).filter(k=>hd[k]).sort();
  let best=0, run=0;
  for (let i=0; i<dates.length; i++) {
    run = i===0 ? 1 : ((new Date(dates[i])-new Date(dates[i-1]))/86400000===1 ? run+1 : 1);
    if (run>best) best=run;
  }
  if (cur>best) best=cur;
  return { cur, best };
}

// ─── FILTERED ───────────────────────────────
function filteredDaily() {
  return habits.filter(h => {
    if (h.type !== 'daily') return false;
    return activeR === 'all' || h.routine === activeR;
  });
}

// ─── KPI ────────────────────────────────────
function renderKPI() {
  const daily = habits.filter(h => h.type==='daily');
  const days  = daysIn(vY, vM);
  const cap   = isViewNow() ? TD : days;
  let todayDone = 0;
  daily.forEach(h => { if (getChk(h.id)[dk(TY,TM,TD)]) todayDone++; });
  let tp=0, td=0;
  daily.forEach(h => {
    const hd = getChk(h.id);
    for (let d=1; d<=cap; d++) { tp++; if (hd[dk(vY,vM,d)]) td++; }
  });
  const rate = tp>0 ? Math.round(td/tp*100) : 0;
  let bestCur = 0;
  daily.forEach(h => { const s=calcStreak(h.id); if(s.best>bestCur) bestCur=s.best; });
  const mDone  = habits.filter(h=>h.type==='monthly'&&getChk(h.id)[mk(vY,vM)]).length;
  const mTotal = habits.filter(h=>h.type==='monthly').length;

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-top"><span class="kpi-lbl">Dziś odhaczone</span><span class="kpi-icon">✅</span></div>
      <div class="kpi-val vp">${isViewNow()?todayDone:'—'}/${daily.length}</div>
      <div class="kpi-sub">nawyki dzienne</div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${daily.length&&isViewNow()?Math.round(todayDone/daily.length*100):0}%"></div></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-top"><span class="kpi-lbl">Ukończenie</span><span class="kpi-icon">📊</span></div>
      <div class="kpi-val vc">${rate}%</div>
      <div class="kpi-sub">${td} z ${tp} możliwych</div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${rate}%"></div></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-top"><span class="kpi-lbl">Najlepsza passa</span><span class="kpi-icon">🔥</span></div>
      <div class="kpi-val va">${bestCur}</div>
      <div class="kpi-sub">dni z rzędu</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-top"><span class="kpi-lbl">Miesięczne</span><span class="kpi-icon">🗓</span></div>
      <div class="kpi-val vg">${mDone}/${mTotal}</div>
      <div class="kpi-sub">ukończone</div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${mTotal?Math.round(mDone/mTotal*100):0}%"></div></div>
    </div>`;
}

// ─── CALENDAR ───────────────────────────────
function renderCalendar() {
  const days  = daysIn(vY, vM);
  const daily = habits.filter(h => h.type==='daily');
  const cap   = isViewNow() ? TD : days;

  // correct Mon-based offset for first day of month
  const firstJsDay = new Date(vY, vM, 1).getDay(); // 0=Sun
  const offset = monIndex(firstJsDay);              // 0=Mon … 6=Sun

  // completion %
  let tp=0, td=0;
  daily.forEach(h => {
    const hd = getChk(h.id);
    for (let d=1; d<=cap; d++) { tp++; if (hd[dk(vY,vM,d)]) td++; }
  });
  const pct = tp>0 ? Math.round(td/tp*100) : 0;

  let html = `
    <div class="cal-top">
      <div class="cal-mname">${MONTHS[vM]} ${vY}</div>
      <div class="cal-pct">${pct}%</div>
    </div>
    <div class="cal-wdays">
      ${WDAYS.map(w=>`<div class="cal-wd">${w}</div>`).join('')}
    </div>
    <div class="cal-grid">`;

  // empty leading cells
  for (let i=0; i<offset; i++) html += `<div class="cal-d empty"></div>`;

  // actual days
  for (let d=1; d<=days; d++) {
    const fut = isFuture(d);
    let cls = 'cal-d';
    if (fut) {
      cls += ' fut';
    } else {
      cls += ' av';
      if (daily.length > 0) {
        let done = 0;
        daily.forEach(h => { if (getChk(h.id)[dk(vY,vM,d)]) done++; });
        if (done === daily.length) cls += ' done';
        else if (done > 0)        cls += ' partial';
      }
    }
    if (isToday(d)) cls += ' today-r';
    html += `<div class="${cls}"><span>${d}</span></div>`;
  }

  // trailing empty cells to fill last row to 7
  const totalCells = offset + days;
  const remainder = totalCells % 7;
  if (remainder > 0) {
    for (let i=0; i < 7-remainder; i++) html += `<div class="cal-d empty"><span></span></div>`;
  }

  html += `</div>`;
  document.getElementById('calCard').innerHTML = html;
}

// ─── LINE CHART ─────────────────────────────
function renderLine() {
  const daily = habits.filter(h => h.type==='daily');
  const days  = daysIn(vY, vM);
  const capToday = isViewNow() ? TD : days;
  const labels = Array.from({length:days}, (_,i) => i+1);
  const vals   = labels.map(d => {
    if (!daily.length) return 0;
    if (d > capToday) return 0;
    let done=0; daily.forEach(h => { if (getChk(h.id)[dk(vY,vM,d)]) done++; });
    return Math.round(done/daily.length*100);
  });
  const ctx = document.getElementById('lineChart').getContext('2d');
  if (lineInst) lineInst.destroy();
  lineInst = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: vals,
        borderColor: '#6c3bff',
        backgroundColor: c => {
          const g = c.chart.ctx.createLinearGradient(0,0,0,c.chart.height||160);
          g.addColorStop(0,'rgba(108,59,255,0.22)');
          g.addColorStop(1,'rgba(108,59,255,0)');
          return g;
        },
        borderWidth: 2.5,
        pointRadius: 3,
        pointHoverRadius: 4,
        pointBackgroundColor: '#a78bfa',
        pointBorderColor: '#12121e',
        pointBorderWidth: 2,
        tension: .45,
        fill: true,
        spanGaps: true
      }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{backgroundColor:'#18182a',borderColor:'#35354f',borderWidth:1,titleColor:'#7070a0',bodyColor:'#f1f0ff',callbacks:{label:c=>` ${c.raw}%`}}
      },
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.02)'},ticks:{color:'#36365a',font:{family:'Poppins',size:9},maxTicksLimit:31,autoSkip:false,maxRotation:0}},
        y:{min:0,max:100,grid:{color:'rgba(255,255,255,0.02)'},ticks:{color:'#36365a',font:{family:'Poppins',size:10},callback:v=>v+'%'}}
      }
    }
  });
}

// ─── DAILY HABITS ───────────────────────────
function renderDaily() {
  const daily = filteredDaily();
  document.getElementById('dailyBadge').textContent = `${daily.length} nawyków`;
  const el = document.getElementById('dailyList');
  if (!daily.length) {
    el.innerHTML = `<div class="empty"><p>Brak nawyków${activeR!=='all'?' w tej rutynie':''} — dodaj pierwszy!</p></div>`;
    return;
  }
  const days = daysIn(vY, vM);
  const cap  = isViewNow() ? TD : days; // for counting done so far

  el.innerHTML = daily.map(h => {
    const hd = getChk(h.id);
    let md=0; for(let d=1; d<=cap; d++) if(hd[dk(vY,vM,d)]) md++;
    const s    = calcStreak(h.id);
    const pill = s.cur>=3 ? `<span class="streak-pill">🔥 ${s.cur}</span>` : '';
    const rmap = {morning:'🌄 Poranna',evening:'🌙 Wieczorna',daily:'☀️ Dzienna'};
    const rtag = h.routine && h.routine!=='all' ? `<span class="rtag">${rmap[h.routine]||''}</span>` : '';

    const daysHtml = Array.from({length:days}, (_,i) => {
      const d=i+1, key=dk(vY,vM,d);
      const checked=!!hd[key], fut=isFuture(d), tod=isToday(d);
      let cls='d-cb';
      if (checked) cls+=' checked';
      if (fut)     cls+=' future';
      if (tod)     cls+=' today-r';
      return `<div class="day-col">
        <div class="d-num">${d}</div>
        <div class="${cls}" data-id="${h.id}" data-key="${key}"
             onclick="toggleDay(this)" style="--cc:${h.color||'#6c3bff'}">${checked?'✓':''}</div>
      </div>`;
    }).join('');

    return `<div class="habit-row" draggable="true" data-id="${h.id}" style="--hc:${h.color||'#6c3bff'}"
      ondragstart="dragStart(event)" ondragover="dragOver(event)"
      ondrop="dragDrop(event)" ondragend="dragEnd(event)">
      <div class="hab-hdr">
        <span class="drag-handle" title="Zmień kolejność">⠿</span>
        <span class="hab-name">${h.emoji} ${h.name}</span>
        ${rtag}${pill}
        <span class="hab-prog"><b>${md}</b>/${days}</span>
        <div class="hab-btns">
          <button class="btn-ic edit" onclick="openEdit('${h.id}')">✏️</button>
          <button class="btn-ic" onclick="delHabit('${h.id}')">🗑</button>
        </div>
      </div>
      <div class="days-outer"><div class="days-grid">${daysHtml}</div></div>
    </div>`;
  }).join('');
  setTimeout(attachTouchDrag, 0);
}

function toggleDay(el) {
  if (el.classList.contains('future')) return;
  const id=el.dataset.id, key=el.dataset.key;
  const cur=!!getChk(id)[key];
  setChk(id, key, !cur);
  renderAll();
}

// ─── DRAG & DROP (desktop + mobile touch) ───
let touchDragEl = null, touchPlaceholder = null, touchOffsetY = 0;

function dragStart(e) { dragSrcId=e.currentTarget.dataset.id; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
function dragOver(e)  { e.preventDefault(); e.dataTransfer.dropEffect='move'; document.querySelectorAll('.habit-row').forEach(r=>r.classList.remove('drag-over')); e.currentTarget.classList.add('drag-over'); }
function dragDrop(e)  {
  e.preventDefault();
  const tid=e.currentTarget.dataset.id;
  if (!dragSrcId||dragSrcId===tid) return;
  const si=habits.findIndex(h=>h.id===dragSrcId), ti=habits.findIndex(h=>h.id===tid);
  if (si<0||ti<0) return;
  const [m]=habits.splice(si,1); habits.splice(ti,0,m);
  save(); renderAll();
}
function dragEnd(e) { e.currentTarget.classList.remove('dragging'); document.querySelectorAll('.habit-row').forEach(r=>r.classList.remove('drag-over')); dragSrcId=null; }

// Touch drag
function touchStart(e) {
  const row = e.currentTarget;
  const handle = e.target.closest('.drag-handle');
  if (!handle) return; // only drag from handle
  e.preventDefault();
  dragSrcId = row.dataset.id;
  touchOffsetY = e.touches[0].clientY - row.getBoundingClientRect().top;

  // clone as ghost
  touchDragEl = row.cloneNode(true);
  touchDragEl.style.cssText = `
    position:fixed;z-index:999;width:${row.offsetWidth}px;
    opacity:0.85;pointer-events:none;
    left:${row.getBoundingClientRect().left}px;
    top:${row.getBoundingClientRect().top}px;
    box-shadow:0 8px 30px rgba(108,59,255,0.3);
    border:1px solid var(--pu);border-radius:13px;
  `;
  document.body.appendChild(touchDragEl);
  row.classList.add('dragging');
}

function touchMove(e) {
  if (!touchDragEl) return;
  e.preventDefault();
  const y = e.touches[0].clientY;
  const x = e.touches[0].clientX;
  touchDragEl.style.top = (y - touchOffsetY) + 'px';

  // find which row we're hovering
  touchDragEl.style.display = 'none';
  const elBelow = document.elementFromPoint(x, y);
  touchDragEl.style.display = '';
  const targetRow = elBelow && elBelow.closest('.habit-row[data-id]');
  document.querySelectorAll('.habit-row').forEach(r => r.classList.remove('drag-over'));
  if (targetRow && targetRow.dataset.id !== dragSrcId) targetRow.classList.add('drag-over');
}

function touchEnd(e) {
  if (!touchDragEl) return;
  const y = e.changedTouches[0].clientY;
  const x = e.changedTouches[0].clientX;
  touchDragEl.remove(); touchDragEl = null;
  document.querySelectorAll('.habit-row').forEach(r => { r.classList.remove('dragging','drag-over'); });

  const elBelow = document.elementFromPoint(x, y);
  const targetRow = elBelow && elBelow.closest('.habit-row[data-id]');
  if (targetRow && targetRow.dataset.id !== dragSrcId) {
    const si=habits.findIndex(h=>h.id===dragSrcId), ti=habits.findIndex(h=>h.id===targetRow.dataset.id);
    if (si>=0&&ti>=0) { const [m]=habits.splice(si,1); habits.splice(ti,0,m); save(); renderAll(); }
  }
  dragSrcId = null;
}

// attach touch listeners after render
function attachTouchDrag() {
  document.querySelectorAll('.habit-row[data-id]').forEach(row => {
    row.removeEventListener('touchstart', touchStart);
    row.removeEventListener('touchmove', touchMove);
    row.removeEventListener('touchend', touchEnd);
    row.addEventListener('touchstart', touchStart, {passive:false});
    row.addEventListener('touchmove', touchMove, {passive:false});
    row.addEventListener('touchend', touchEnd);
  });
}

// ─── MONTHLY ────────────────────────────────
function renderMonthly() {
  const monthly = habits.filter(h=>h.type==='monthly');
  const sec = document.getElementById('secMonthly');
  if (!monthly.length) { sec.style.display='none'; return; }
  sec.style.display='';
  const mkey = mk(vY, vM);

  document.getElementById('monthlyList').innerHTML = monthly.map(h => {
    const checked = !!getChk(h.id)[mkey];
    return `<div class="m-item" style="--hc:${h.color||'#a855f7'}">
      <div class="m-inner">
        <span style="font-size:1rem;flex-shrink:0">${h.emoji}</span>
        <span class="m-name">${h.name}</span>
        <span class="m-status ${checked?'done':'open'}">${checked?'Zrobione':'Do zrobienia'}</span>
        <div class="m-check ${checked?'done':''}" data-id="${h.id}" data-key="${mkey}" onclick="toggleMonthly(this)"></div>
        <div class="m-btns">
          <button class="btn-ic edit" onclick="openEdit('${h.id}')">✏️</button>
          <button class="btn-ic" onclick="delHabit('${h.id}')">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');

  const doneCount = monthly.filter(h=>getChk(h.id)[mkey]).length;
  const total     = monthly.length;
  const pct       = total>0 ? Math.round(doneCount/total*100) : 0;
  document.getElementById('mPct').textContent   = pct+'%';
  document.getElementById('mCount').textContent = `${doneCount} z ${total} ukończone`;

  const canvas = document.getElementById('mDonut');
  if (donutInst) donutInst.destroy();
  donutInst = new Chart(canvas.getContext('2d'), {
    type: 'doughnut',
    data: { datasets:[{ data:[doneCount, Math.max(0,total-doneCount)], backgroundColor:['#6c3bff','#1e1e32'], borderColor:['#6c3bff','#28283e'], borderWidth:2, hoverOffset:0 }] },
    options: { cutout:'70%', responsive:false, plugins:{legend:{display:false},tooltip:{enabled:false}}, animation:{duration:600} }
  });
}

function toggleMonthly(el) {
  const cur=!!getChk(el.dataset.id)[el.dataset.key];
  setChk(el.dataset.id, el.dataset.key, !cur);
  renderAll();
}

// ─── MONTH NAV ──────────────────────────────
function updateLabel() { document.getElementById('monthLabel').textContent=`${MONTHS[vM]} ${vY}`; }
document.getElementById('btnPrev').onclick = () => { vM--; if(vM<0){vM=11;vY--;} renderAll(); };
document.getElementById('btnNext').onclick = () => { vM++; if(vM>11){vM=0;vY++;} renderAll(); };
document.querySelectorAll('.rtab').forEach(btn => {
  btn.onclick = () => { document.querySelectorAll('.rtab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); activeR=btn.dataset.r; renderAll(); };
});

// ─── MODAL ──────────────────────────────────
function buildModal() {
  document.getElementById('emojiGrid').innerHTML = EMOJIS.map(e=>`<button class="e-btn" onclick="pickEmoji(this,'${e}')">${e}</button>`).join('');
  document.getElementById('colorPicker').innerHTML = COLORS.map((c,i)=>`<div class="c-btn ${i===0?'sel':''}" style="background:${c}" onclick="pickColor(this,'${c}')"></div>`).join('');
  document.getElementById('fEmoji').addEventListener('input', function() {
    const v=this.value.trim(); if(v){ selEmoji=v; document.getElementById('emojiPrev').textContent=v; if(selEBtn){selEBtn.classList.remove('sel');selEBtn=null;} }
  });
}
function pickEmoji(btn,e){ if(selEBtn)selEBtn.classList.remove('sel'); btn.classList.add('sel'); selEBtn=btn; selEmoji=e; document.getElementById('emojiPrev').textContent=e; document.getElementById('fEmoji').value=''; }
function pickColor(btn,c){ document.querySelectorAll('.c-btn').forEach(b=>b.classList.remove('sel')); btn.classList.add('sel'); selColor=c; }

document.getElementById('btnOpenModal').onclick = () => {
  editId=null;
  document.getElementById('modalH').textContent='Nowy nawyk';
  document.getElementById('fName').value='';
  document.getElementById('fType').value='daily';
  document.getElementById('fRoutine').value='all';
  document.getElementById('fEmoji').value='';
  document.getElementById('emojiPrev').textContent='✨';
  selEmoji='✨'; selColor=COLORS[0];
  document.querySelectorAll('.c-btn').forEach((b,i)=>b.classList.toggle('sel',i===0));
  document.querySelectorAll('.e-btn').forEach(b=>b.classList.remove('sel'));
  selEBtn=null;
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fName').focus(),100);
};
document.getElementById('btnClose').onclick = () => document.getElementById('modalOverlay').classList.remove('open');
document.getElementById('modalOverlay').onclick = e => { if(e.target===document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('open'); };

function openEdit(id) {
  const h=habits.find(h=>h.id===id); if(!h) return;
  editId=id;
  document.getElementById('modalH').textContent='Edytuj nawyk';
  document.getElementById('fName').value=h.name;
  document.getElementById('fType').value=h.type;
  document.getElementById('fRoutine').value=h.routine||'all';
  selEmoji=h.emoji; selColor=h.color||COLORS[0];
  document.getElementById('emojiPrev').textContent=h.emoji;
  document.getElementById('fEmoji').value='';
  document.querySelectorAll('.e-btn').forEach(b=>{ const s=b.textContent===h.emoji; b.classList.toggle('sel',s); if(s)selEBtn=b; });
  document.querySelectorAll('.c-btn').forEach(b=>b.classList.toggle('sel',b.style.background===h.color));
  document.getElementById('modalOverlay').classList.add('open');
}

document.getElementById('btnSave').onclick = () => {
  const name=document.getElementById('fName').value.trim();
  if(!name){ toast('Wpisz nazwę nawyku!'); document.getElementById('fName').focus(); return; }
  const type=document.getElementById('fType').value;
  const routine=document.getElementById('fRoutine').value;
  if (editId) {
    const h=habits.find(h=>h.id===editId);
    if(h){h.name=name;h.emoji=selEmoji;h.type=type;h.color=selColor;h.routine=routine;}
    toast('Nawyk zaktualizowany ✓');
  } else {
    habits.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,5),name,emoji:selEmoji,type,color:selColor,routine});
    toast('Nowy nawyk dodany 🎉');
  }
  save(); document.getElementById('modalOverlay').classList.remove('open'); renderAll();
};

function delHabit(id) {
  if(!confirm('Usunąć nawyk? Dane zostaną utracone.')) return;
  habits=habits.filter(h=>h.id!==id); delete checks[id];
  save(); toast('Nawyk usunięty'); renderAll();
}

    {id:'m2',name:'Sprzątanie',       emoji:'🧹',type:'monthly',color:'#f43f5e',routine:'all'},
    {id:'m3',name:'Budżet miesięczny',emoji:'💰',type:'monthly',color:'#10b981',routine:'all'},
